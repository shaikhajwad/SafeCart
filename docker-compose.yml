services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: safecart
      POSTGRES_USER: safecart
      POSTGRES_PASSWORD: safecart_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safecart"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://safecart:safecart_dev@postgres:5432/safecart
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      NODE_ENV: development
      APP_BASE_URL: http://localhost:3000
      # Set this to a real phone number (E.164) to bootstrap the first admin user
      ADMIN_PHONE: "+10000000000"
      # Where checkout-web is publicly accessible (used for order tracking links in emails)
      CHECKOUT_WEB_BASE_URL: http://localhost:3001
      # Comma-separated list of allowed CORS origins
      CORS_ORIGINS: "http://localhost:3001,http://localhost:3002,http://localhost:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  checkout-web:
    build:
      context: ./frontend/apps/checkout-web
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      # Empty string so browser-side code uses Next.js API rewrites (relative /api/* paths)
      # which proxy to backend container-to-container via API_BASE_URL below
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_SELLER_DASHBOARD_URL: http://localhost:3002
      # Server-side (SSR / API routes) use this to reach the backend container directly
      API_BASE_URL: http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  seller-web:
    build:
      context: ./frontend/apps/seller-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_APP_BASE_URL: http://localhost:3001
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  admin-web:
    build:
      context: ./frontend/apps/admin-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "3003:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
